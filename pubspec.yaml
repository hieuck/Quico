name: quico
description: Quico - Ban hang de nhu nhan tin
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: any
  riverpod_annotation: any
  go_router: any
  drift: any
  sqlite3_flutter_libs: any
  path: any
  path_provider: any
  uuid: any
  intl: any
  image_picker: any
  permission_handler: any
  share_plus: any
  printing: any
  pdf: any
  screenshot: any
  speech_to_text: any
  google_mlkit_text_recognition: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  drift_dev: any
  riverpod_generator: any
  riverpod_lint: any
  custom_lint: any
  flutter_lints: any

flutter:
