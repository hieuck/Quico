name: iOS Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: i18n gate check
        run: python3 scripts/i18n_gate.py

      - name: Format code
        run: dart format . || true

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p release_artifacts
          mkdir -p release_artifacts/Payload
          cp -r build/ios/iphoneos/Runner.app release_artifacts/Payload/
          cd release_artifacts && zip -r quico-unsigned.ipa Payload/
          rm -rf Payload

      - name: Check signing secrets
        id: signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" && -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" && -n "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" && -n "${{ secrets.IOS_TEAM_ID }}" && -n "${{ secrets.IOS_BUNDLE_ID }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing files
        if: steps.signing.outputs.available == 'true'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/certificate.p12"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"

      - name: Install signing certificate
        if: steps.signing.outputs.available == 'true'
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing/certificate.p12" \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: steps.signing.outputs.available == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$RUNNER_TEMP/signing/profile.mobileprovision")")
          cp "$RUNNER_TEMP/signing/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Build signed IPA
        if: steps.signing.outputs.available == 'true'
        shell: bash
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          mkdir -p release_artifacts
          find build/ios/ipa -name "*.ipa" -exec cp {} release_artifacts/Quico.ipa \;

      - name: Create release notes
        shell: bash
        run: |
          cat > release_artifacts/RELEASE_NOTES.md <<'EOF'
          # Quico Release

          This release was generated by GitHub Actions.

          Artifacts:
          - `quico-unsigned.ipa` — unsigned IPA for sideloading (e.g. AltStore). No Apple signing required.
          - `Quico.ipa` — signed IPA (only if Apple signing secrets were configured).

          ## Install unsigned IPA

          1. Download `quico-unsigned.ipa`.
          2. Use AltStore, SideStore, or similar sideload tool to install on iPhone.
          3. Requires free Apple ID (no paid developer account needed).

          ## Install signed IPA

          Requires valid provisioning profile matching your device UDID.
          See docs/10_IOS_SIGNING.md for signing setup.
          EOF

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_artifacts/RELEASE_NOTES.md
          files: |
            release_artifacts/*
